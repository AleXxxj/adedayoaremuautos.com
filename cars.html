<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Cars - Adedayo Aremu Autos</title>
    <style>
        /* Copy ALL styles from the new homepage here */
        /* Same exact CSS as the premium homepage */
        
        /* Additional styles specific to cars page */
        .page-header {
            margin-top: 90px;
            padding: 60px 50px;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        
        .page-header h1 {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .page-header p {
            color: var(--text-muted);
            font-size: 18px;
        }
        
        .filters-section {
            padding: 30px 50px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
        }
        
        .filters-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .filter-group label {
            color: var(--text-muted);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .filter-group select {
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .filter-group select:hover,
        .filter-group select:focus {
            border-color: var(--primary);
            outline: none;
        }
        
        .filter-group select option {
            background: var(--dark-bg);
            color: white;
        }
        
        .filter-actions {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }
        
        .btn-filter {
            padding: 12px 25px;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            color: #0a0a0a;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-filter:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        
        .btn-reset {
            padding: 12px 25px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-reset:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .cars-listing {
            padding: 50px;
            background: var(--dark-bg);
        }
        
        .listing-header {
            max-width: 1400px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .results-count {
            color: var(--text-muted);
        }
        
        .results-count span {
            color: var(--primary);
            font-weight: 600;
        }
        
        .sort-dropdown {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .sort-dropdown label {
            color: var(--text-muted);
        }
        
        .sort-dropdown select {
            padding: 8px 15px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: white;
        }
        
        .pagination {
            max-width: 1400px;
            margin: 50px auto 0;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        
        .page-link {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .page-link:hover,
        .page-link.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #0a0a0a;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 36px;
            }
            
            .filter-grid {
                grid-template-columns: 1fr;
            }
            
            .filter-actions {
                flex-direction: column;
            }
            
            .listing-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>
